name: Build CrossPoint Firmware

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new commits
        id: check
        run: |
          # Get latest upstream commit
          COMMIT_JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/crosspoint-reader/crosspoint-reader/commits/master")

          LATEST=$(echo "$COMMIT_JSON" | jq -r '.sha')
          SHORT="${LATEST:0:7}"
          # Use heredoc for multiline-safe output
          {
            echo "commit=$LATEST"
            echo "commit_short=$SHORT"
          } >> "$GITHUB_OUTPUT"

          # Get first line of commit message only
          MSG=$(echo "$COMMIT_JSON" | jq -r '.commit.message' | head -1 | tr -d '\r')
          # Use heredoc delimiter for message to handle special chars
          {
            echo "message<<MSG_EOF"
            echo "$MSG"
            echo "MSG_EOF"
          } >> "$GITHUB_OUTPUT"

          # For workflow_dispatch, always build
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — building $SHORT"
            exit 0
          fi

          # Check if we already built this commit successfully
          BUILD_JSON=$(curl -s "https://crosspointreader.com/api/build/latest")
          CURRENT=$(echo "$BUILD_JSON" | jq -r '.commit // empty')
          CURRENT_STATUS=$(echo "$BUILD_JSON" | jq -r '.status // empty')
          if [ "$CURRENT" = "$LATEST" ] && [ "$CURRENT_STATUS" = "success" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already built $LATEST successfully, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New commit or previous build not successful: $SHORT (status: $CURRENT_STATUS)"
          fi

      - name: Mark build as started
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -s -X POST "https://crosspointreader.com/api/build/status" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"building\",
              \"commit\": \"${{ steps.check.outputs.commit }}\",
              \"commitShort\": \"${{ steps.check.outputs.commit_short }}\",
              \"commitMessage\": \"${{ steps.check.outputs.message }}\"
            }"

      - name: Checkout crosspoint-reader
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          repository: crosspoint-reader/crosspoint-reader
          ref: master
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        if: steps.check.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        if: steps.check.outputs.skip == 'false'
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Build CrossPoint
        if: steps.check.outputs.skip == 'false'
        run: pio run -e gh_release

      - name: Get version and changelog
        if: steps.check.outputs.skip == 'false'
        id: info
        run: |
          # Version from platformio.ini
          VERSION=$(grep -oP 'version\s*=\s*\K.*' platformio.ini | head -1)
          echo "version=${VERSION}-dev+${{ steps.check.outputs.commit_short }}" >> "$GITHUB_OUTPUT"

          # Changelog as JSON array — use jq to safely escape commit messages
          BASE_REF=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          git log "${BASE_REF}..HEAD" --pretty=format:"%H%x00%h%x00%an%x00%aI%x00%s" | while IFS= read -r line; do
            IFS=$'\0' read -r hash short author date msg <<< "$line"
            jq -n --arg h "$hash" --arg s "$short" --arg a "$author" --arg d "$date" --arg m "$msg" \
              '{hash:$h, hashShort:$s, author:$a, date:$d, message:$m}'
          done | jq -s '.' > /tmp/changelog.json

      - name: Upload firmware to R2
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -s -X PUT "https://crosspointreader.com/api/build/upload" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/octet-stream" \
            -H "X-Build-Commit: ${{ steps.check.outputs.commit }}" \
            -H "X-Build-Version: ${{ steps.info.outputs.version }}" \
            --data-binary @".pio/build/gh_release/firmware.bin"

      - name: Update build metadata (success)
        if: steps.check.outputs.skip == 'false'
        run: |
          FIRMWARE=".pio/build/gh_release/firmware.bin"
          SIZE=$(stat -c%s "$FIRMWARE")
          CHANGELOG=$(cat /tmp/changelog.json)

          # Build the JSON payload carefully
          jq -n \
            --arg status "success" \
            --arg commit "${{ steps.check.outputs.commit }}" \
            --arg commitShort "${{ steps.check.outputs.commit_short }}" \
            --arg commitMessage "${{ steps.check.outputs.message }}" \
            --arg version "${{ steps.info.outputs.version }}" \
            --argjson firmwareSize "$SIZE" \
            --argjson changelog "$CHANGELOG" \
            '{status: $status, commit: $commit, commitShort: $commitShort, commitMessage: $commitMessage, version: $version, firmwareSize: $firmwareSize, changelog: $changelog}' \
            | curl -s -X POST "https://crosspointreader.com/api/build/status" \
              -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
              -H "Content-Type: application/json" \
              -d @-

      - name: Mark build as failed
        if: failure() && steps.check.outputs.skip == 'false'
        run: |
          curl -s -X POST "https://crosspointreader.com/api/build/status" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"failed\",
              \"commit\": \"${{ steps.check.outputs.commit }}\",
              \"commitShort\": \"${{ steps.check.outputs.commit_short }}\",
              \"error\": \"Build failed — check GitHub Actions logs\"
            }"
