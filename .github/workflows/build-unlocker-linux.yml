name: Build Unlocker (Linux)

# Builds + signs + uploads the Linux x86_64 and aarch64 artifacts (AppImage +
# .AppImage.sig, deb, rpm) and writes latest-linux-<arch>.json manifests to R2.
#
# Trigger: a `vX.Y.Z` tag push (matches unlocker-tool/scripts/release.sh) or manual dispatch.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY            minisign private key (single-line)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   optional, if the key is password-protected
#   UNLOCKER_TLS_PRIVKEY_PEM             TLS private key baked into the helper
#   CLOUDFLARE_ACCOUNT_ID
#   CLOUDFLARE_R2_ACCESS_KEY
#   CLOUDFLARE_R2_SECRET_KEY
#   CLOUDFLARE_R2_BUCKET                 optional, defaults to "unlocker-releases"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload to Cloudflare R2 + write update manifest'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: unlocker-tool

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            rpm \
            jq

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          # Don't cache `target/` — Tauri's bundlers won't re-bundle if their
          # output already exists, so a restored stale `target/.../bundle/`
          # ends up shipping the previous release's .deb / .rpm under the new
          # version's filename. Caching just registry + git is the safe subset.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('unlocker-tool/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clean previous bundle outputs
        # Belt-and-suspenders in case anything else recreates target/.
        run: rm -rf target/${{ matrix.target }}/release/bundle

      - name: Install frontend dependencies
        working-directory: unlocker-tool/app
        run: npm ci

      - name: Materialize bundled TLS private key
        # The helper bakes the Let's Encrypt cert + key into the binary via
        # include_str!. The key is gitignored, so CI has to write it from a
        # secret before cargo build can find it.
        env:
          PRIVKEY_PEM: ${{ secrets.UNLOCKER_TLS_PRIVKEY_PEM }}
        run: |
          if [ -z "$PRIVKEY_PEM" ]; then
            echo "::error::UNLOCKER_TLS_PRIVKEY_PEM secret is not set"
            exit 1
          fi
          install -m 0600 /dev/null crates/unlocker-helper/certs/privkey.pem
          printf '%s\n' "$PRIVKEY_PEM" > crates/unlocker-helper/certs/privkey.pem

      - name: Build (helper + Tauri bundle)
        run: ./scripts/build-linux.sh
        env:
          LINUX_TARGET: ${{ matrix.target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts to GH Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            unlocker-tool/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            unlocker-tool/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            unlocker-tool/target/${{ matrix.target }}/release/bundle/deb/*.deb
            unlocker-tool/target/${{ matrix.target }}/release/bundle/rpm/*.rpm

      - name: Install AWS CLI
        if: startsWith(github.ref, 'refs/tags/v') || inputs.upload
        run: |
          # awscli is preinstalled on ubuntu-22.04 runners; ensure jq + a recent
          # version are available regardless.
          aws --version

      - name: Upload to Cloudflare R2 + write manifest
        if: startsWith(github.ref, 'refs/tags/v') || inputs.upload
        run: ./scripts/upload-to-cloudflare-linux.sh
        env:
          LINUX_TARGET: ${{ matrix.target }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            unlocker-tool/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            unlocker-tool/target/${{ matrix.target }}/release/bundle/deb/*.deb
            unlocker-tool/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
