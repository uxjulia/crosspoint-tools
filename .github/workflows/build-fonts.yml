name: Build .cpfont

on:
  workflow_dispatch:
    inputs:
      buildId:
        description: 'Font build ID'
        required: true
      family:
        description: 'Font family name (used for output filenames)'
        required: true
      sizes:
        description: 'Comma-separated point sizes, e.g. "12,14,16,18"'
        required: true
      intervals:
        description: 'Codepoint interval presets'
        required: false
        default: 'base'
      webhookBaseUrl:
        description: 'Base URL for webhook callbacks'
        required: false
        default: 'https://crosspointreader.com'

concurrency:
  group: font-build-${{ inputs.buildId }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_ID: ${{ inputs.buildId }}
    steps:
      - name: Resolve webhook base URL
        env:
          WEBHOOK_BASE_URL_RAW: ${{ inputs.webhookBaseUrl }}
        run: |
          BASE="${WEBHOOK_BASE_URL_RAW:-https://crosspointreader.com}"
          echo "WEBHOOK_BASE_URL=${BASE%/}" >> "$GITHUB_ENV"
          BUILD_ID_URLENC=$(jq -rn --arg value "$BUILD_ID" '$value | @uri')
          echo "BUILD_ID_URLENC=$BUILD_ID_URLENC" >> "$GITHUB_ENV"

      - name: Mark build as started
        run: |
          payload=$(jq -nc --arg buildId "$BUILD_ID" --arg status "building" \
            '{buildId: $buildId, status: $status}')
          curl -sf -X POST "${WEBHOOK_BASE_URL}/api/font-build/status-update" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Checkout crosspoint-tools
        uses: actions/checkout@v6

      - name: Download uploaded TTFs
        id: download
        run: |
          mkdir -p /tmp/ttfs
          ARGS=()
          for style in regular bold italic bolditalic; do
            target="/tmp/ttfs/$style.ttf"
            if curl -sf \
                -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
                -o "$target" \
                "${WEBHOOK_BASE_URL}/api/font-build/files/${BUILD_ID_URLENC}/$style.ttf"; then
              echo "Downloaded $style ($(stat -c%s "$target") bytes)"
              ARGS+=("--$style" "$target")
            else
              rm -f "$target"
            fi
          done
          target="/tmp/ttfs/fallback-regular.ttf"
          if curl -sf \
              -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
              -o "$target" \
              "${WEBHOOK_BASE_URL}/api/font-build/files/${BUILD_ID_URLENC}/fallback1/regular.ttf"; then
            echo "Downloaded fallback regular ($(stat -c%s "$target") bytes)"
            ARGS+=("--fallback-regular" "$target")
          else
            rm -f "$target"
          fi
          target="/tmp/ttfs/fallback2-regular.ttf"
          if curl -sf \
              -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
              -o "$target" \
              "${WEBHOOK_BASE_URL}/api/font-build/files/${BUILD_ID_URLENC}/fallback2/regular.ttf"; then
            echo "Downloaded fallback 2 regular ($(stat -c%s "$target") bytes)"
            ARGS+=("--fallback2-regular" "$target")
          else
            rm -f "$target"
          fi
          if [ ${#ARGS[@]} -eq 0 ]; then
            echo "No TTFs available for build $BUILD_ID" >&2
            exit 1
          fi
          # Persist style flags for the next step
          printf '%s\n' "${ARGS[@]}" > /tmp/style_args.txt

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install font conversion dependencies
        run: pip install --no-cache-dir freetype-py fonttools brotli

      - name: Run fontconvert_sdcard.py
        run: |
          mkdir -p out
          mapfile -t STYLE_ARGS < /tmp/style_args.txt
          DEFAULT_FALLBACK_DIR="scripts/font-builder/default-fallback-fonts"
          DEFAULT_FALLBACK_ARGS=(
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSans-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansHebrew-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansArmenian-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansGeorgian-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansEthiopic-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansCherokee-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansTifinagh-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansCoptic-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansMath-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansSymbols-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansSymbols2-Regular.ttf"
            --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoEmoji-Regular.ttf"
          )
          if [[ ",${{ inputs.intervals }}," == *",cjk-jp,"* ]]; then
            DEFAULT_FALLBACK_ARGS+=(
              --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansCJKjp-Regular.otf"
              --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansCJKsc-Regular.otf"
            )
          elif [[ ",${{ inputs.intervals }}," == *",cjk-sc,"* ]]; then
            DEFAULT_FALLBACK_ARGS+=(
              --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansCJKsc-Regular.otf"
              --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansCJKjp-Regular.otf"
            )
          else
            DEFAULT_FALLBACK_ARGS+=(
              --default-fallback-font "$DEFAULT_FALLBACK_DIR/NotoSansCJKjp-Regular.otf"
            )
          fi
          python scripts/font-builder/fontconvert_sdcard.py \
            "${STYLE_ARGS[@]}" \
            "${DEFAULT_FALLBACK_ARGS[@]}" \
            --name "${{ inputs.family }}" \
            --intervals "${{ inputs.intervals }}" \
            --sizes "${{ inputs.sizes }}" \
            --output-dir out 2>&1 | tee /tmp/build.log

      - name: Upload .cpfont results
        run: |
          shopt -s nullglob
          count=0
          for f in out/*.cpfont; do
            name=$(basename "$f")
            size=$(stat -c%s "$f")
            echo "Uploading $name ($size bytes)"
            curl -sf -X PUT \
              -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
              -H "X-Build-Id: $BUILD_ID" \
              -H "X-Filename: $name" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f" \
              "${WEBHOOK_BASE_URL}/api/font-build/upload-result"
            count=$((count + 1))
          done
          if [ "$count" -eq 0 ]; then
            echo "No .cpfont files produced" >&2
            exit 1
          fi
          echo "Uploaded $count file(s)"

      - name: Mark build success
        run: |
          # Attach the build log tail so users can see glyph/kern stats.
          LOG_TAIL=$(tail -c 4000 /tmp/build.log | jq -Rs .)
          payload=$(jq -nc \
            --arg buildId "$BUILD_ID" \
            --arg status "success" \
            --arg generatorVersion "${{ github.sha }}" \
            --argjson log "$LOG_TAIL" \
            '{buildId: $buildId, status: $status, generatorVersion: $generatorVersion, log: $log}')
          curl -sf -X POST "${WEBHOOK_BASE_URL}/api/font-build/status-update" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Mark build failed
        if: failure()
        run: |
          LOG_TAIL=$(tail -c 4000 /tmp/build.log 2>/dev/null | jq -Rs . || echo '""')
          payload=$(jq -nc \
            --arg buildId "$BUILD_ID" \
            --arg status "failed" \
            --arg error "Build failed. See GitHub Actions logs." \
            --argjson log "$LOG_TAIL" \
            '{buildId: $buildId, status: $status, error: $error, log: $log}')
          curl -sf -X POST "${WEBHOOK_BASE_URL}/api/font-build/status-update" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$payload" || true
